<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHISHA CAFE HALL | 管理画面</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #151515;
      --panel-2: #101010;
      --line: rgba(212,175,55,.22);
      --gold: #d4af37;
      --gold-2: #f4dc8a;
      --text: #fff;
      --muted: #a8a8a8;
      --success: #5dc07b;
      --danger: #f06b6b;
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: linear-gradient(180deg, #111 0%, #080808 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    body { padding: 16px; }
    .wrap { max-width: 1180px; margin: 0 auto; }
    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }
    .topbar h1 {
      margin:0;
      font-size: 24px;
      color: var(--gold-2);
      letter-spacing:.06em;
      line-height:1.2;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }
    .config-row {
      display:grid;
      grid-template-columns: 1fr 180px auto;
      gap:10px;
      width:100%;
      max-width: 760px;
    }
    .panel {
      background:
        linear-gradient(180deg, rgba(212,175,55,.08), rgba(212,175,55,0) 20%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
    }
    .section-title {
      margin: 0 0 14px;
      color: var(--gold-2);
      font-size: 16px;
      line-height: 1.2;
    }
    .grid {
      display:grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 16px;
      align-items:start;
    }
    .stats {
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .stat {
      background: var(--panel-2);
      border:1px solid rgba(255,255,255,.05);
      border-radius: 18px;
      padding: 14px;
      min-height: 96px;
    }
    .stat .label { color: var(--muted); font-size: 13px; }
    .stat strong { display:block; font-size: 30px; margin-top: 8px; }
    input, select, textarea {
      width:100%;
      background:#0f0f0f;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      border-radius:16px;
      padding:14px;
      font-size:15px;
      outline: none;
    }
    textarea { min-height:100px; resize:vertical; }
    button {
      border:0;
      border-radius:16px;
      padding:13px 16px;
      font-weight:800;
      cursor:pointer;
      font-size:15px;
    }
    .gold { background: linear-gradient(90deg, var(--gold), var(--gold-2)); color:#111; }
    .ghost { background: rgba(212,175,55,.08); color:#fff; border:1px solid var(--line); }
    .danger { background: rgba(240,107,107,.12); color:#ffd7d7; border:1px solid rgba(240,107,107,.3); }
    .filters, .form-grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .message { font-size:13px; margin-top:8px; color: var(--muted); }
    .ok { color: #b5efc3; }
    .ng { color: #ffc0c0; }
    .pill {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      color:var(--gold-2);
      min-width: 56px;
      white-space: nowrap;
    }
    .split { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .muted { color: var(--muted); }
    .hidden { display:none !important; }
    .member-cards, .coupon-cards {
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .member-card, .coupon-card {
      background: #101010;
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 18px;
      padding: 14px;
    }
    .member-card-top, .coupon-card-top {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom: 8px;
    }
    .member-name, .coupon-title { font-size: 18px; font-weight: 800; }
    .line-id, .coupon-desc {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      word-break: break-all;
    }
    .member-meta {
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:8px;
      margin: 12px 0;
    }
    .meta-box {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 14px;
      padding: 10px;
    }
    .meta-box .label { color: var(--muted); font-size: 12px; }
    .meta-box strong { display:block; margin-top: 6px; font-size: 18px; }
    .detail-grid {
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:10px;
    }
    .detail-stat {
      background: #101010;
      border:1px solid rgba(255,255,255,.05);
      border-radius:16px;
      padding:12px;
    }
    .detail-stat .label { color: var(--muted); font-size: 12px; }
    .detail-stat strong { display:block; margin-top: 8px; font-size: 24px; }
    .hr {
      height:1px;
      background: rgba(255,255,255,.06);
      margin:16px 0;
    }
    .coupon-badges {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top: 10px;
    }
    .desktop-table { display:none; }

    @media (min-width: 901px) {
      body { padding: 24px; }
      .desktop-table { display:block; }
      .mobile-cards { display:none; }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .config-row { grid-template-columns: 1fr; max-width: none; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters, .form-grid, .form-grid.two, .detail-grid { grid-template-columns: 1fr; }
      .member-meta { grid-template-columns: 1fr 1fr 1fr; }
      .topbar h1 { font-size: 20px; }
      .panel { padding: 16px; }
      .member-card-top, .coupon-card-top { flex-direction: column; align-items:flex-start; }
      .actions button { flex: 1 1 auto; }
      .member-meta strong { font-size: 16px; }
      .detail-stat strong { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>SHISHA CAFE HALL 管理画面</h1>
        <div class="sub">会員・来店・クーポン・VIP管理</div>
      </div>
      <div class="config-row">
        <input id="api-base" placeholder="API Base" />
        <input id="admin-token" placeholder="Admin Token" />
        <button class="gold" id="save-config">接続保存</button>
      </div>
    </div>

    <section class="panel">
      <h3 class="section-title">概要</h3>
      <div class="stats">
        <div class="stat"><div class="label">会員数</div><strong id="stat-members">0</strong></div>
        <div class="stat"><div class="label">VIP候補</div><strong id="stat-candidates">0</strong></div>
        <div class="stat"><div class="label">VIP承認済み</div><strong id="stat-approved">0</strong></div>
        <div class="stat"><div class="label">GOLD以上</div><strong id="stat-gold-up">0</strong></div>
      </div>
    </section>

    <div class="grid">
      <div>
        <section class="panel">
          <div class="split">
            <h3 class="section-title">顧客一覧</h3>
            <button class="ghost" id="refresh-members">更新</button>
          </div>

          <div class="filters" style="margin-bottom:12px;">
            <input id="search-q" placeholder="名前 or LINE IDで検索" />
            <select id="filter-vip">
              <option value="0">全員</option>
              <option value="1">VIP関連のみ</option>
            </select>
            <button class="ghost" id="search-btn">検索</button>
            <button class="gold" id="load-candidates">VIP候補表示</button>
          </div>

          <div class="mobile-cards">
            <div id="members-cards" class="member-cards"></div>
          </div>

          <div class="desktop-table">
            <table style="width:100%; border-collapse:collapse;">
              <thead>
                <tr>
                  <th style="padding:12px 10px; color:var(--gold-2); border-bottom:1px solid rgba(255,255,255,.06); text-align:left;">名前</th>
                  <th style="padding:12px 10px; color:var(--gold-2); border-bottom:1px solid rgba(255,255,255,.06); text-align:left;">ランク</th>
                  <th style="padding:12px 10px; color:var(--gold-2); border-bottom:1px solid rgba(255,255,255,.06); text-align:left;">来店</th>
                  <th style="padding:12px 10px; color:var(--gold-2); border-bottom:1px solid rgba(255,255,255,.06); text-align:left;">累計</th>
                  <th style="padding:12px 10px; color:var(--gold-2); border-bottom:1px solid rgba(255,255,255,.06); text-align:left;">VIP</th>
                  <th style="padding:12px 10px; color:var(--gold-2); border-bottom:1px solid rgba(255,255,255,.06); text-align:left;"></th>
                </tr>
              </thead>
              <tbody id="members-body"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="split">
            <h3 class="section-title">クーポン一覧</h3>
            <button class="ghost" id="load-coupons-btn">更新</button>
          </div>
          <div id="coupon-cards" class="coupon-cards"></div>
          <div id="coupon-list-message" class="message"></div>
        </section>

        <section class="panel">
          <h3 class="section-title">クーポン作成</h3>
          <div class="form-grid two">
            <input id="coupon-title" placeholder="タイトル" />
            <input id="coupon-expires" placeholder="有効期限 2026-04-30" />
            <select id="coupon-rank">
              <option value="">全ランク</option>
              <option>SMOKE</option>
              <option>BRONZE</option>
              <option>SILVER</option>
              <option>GOLD</option>
              <option>DIAMOND</option>
              <option>VIP</option>
            </select>
            <input id="coupon-member-id" placeholder="個別配布する memberId（任意）" />
          </div>
          <textarea id="coupon-description" placeholder="説明"></textarea>
          <div class="actions">
            <button class="gold" id="create-coupon">クーポン作成</button>
          </div>
          <div id="coupon-message" class="message"></div>
        </section>
      </div>

      <div>
        <section class="panel">
          <h3 class="section-title">顧客詳細</h3>
          <div id="detail-empty" class="muted">左の一覧から顧客を選択してください。</div>
          <div id="detail-box" class="hidden">
            <div class="split" style="margin-bottom:12px;">
              <div>
                <div style="font-size:24px; font-weight:800;" id="detail-name">-</div>
                <div class="muted" id="detail-line">-</div>
              </div>
              <span id="detail-rank" class="pill">-</span>
            </div>

            <div class="detail-grid">
              <div class="detail-stat">
                <div class="label">総来店数</div>
                <strong id="detail-visits">0回</strong>
              </div>
              <div class="detail-stat">
                <div class="label">累計利用額</div>
                <strong id="detail-total">¥0</strong>
              </div>
              <div class="detail-stat">
                <div class="label">VIP状態</div>
                <strong id="detail-vip">なし</strong>
              </div>
              <div class="detail-stat">
                <div class="label">memberId</div>
                <strong id="detail-id">-</strong>
              </div>
            </div>

            <div class="hr"></div>

            <h3 class="section-title">来店追加</h3>
            <div class="form-grid two">
              <input id="visit-date" placeholder="2026-03-17" />
              <input id="visit-spent" type="number" placeholder="利用金額" />
              <input id="visit-points" type="number" placeholder="付与ポイント 例:10" value="10" />
              <input id="visit-note" placeholder="メモ" />
            </div>
            <div class="actions" style="margin-top:10px;">
              <button class="gold" id="add-visit-btn">来店を追加</button>
            </div>
            <div id="visit-message" class="message"></div>

            <div class="hr"></div>

            <h3 class="section-title">VIP操作</h3>
            <textarea id="vip-note" placeholder="承認 / 却下メモ"></textarea>
            <div class="actions">
              <button class="gold" id="approve-vip-btn">VIP承認</button>
              <button class="danger" id="reject-vip-btn">VIP却下</button>
            </div>
            <div id="vip-message" class="message"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const state = { members: [], selected: null };

    const apiBaseInput = document.getElementById('api-base');
    const adminTokenInput = document.getElementById('admin-token');
    apiBaseInput.value = localStorage.getItem('hall_api_base') || 'https://hall-loyalty-api.hallshisha.workers.dev';
    adminTokenInput.value = localStorage.getItem('hall_admin_token') || 'hall-admin-demo';

    function saveConfig() {
      localStorage.setItem('hall_api_base', apiBaseInput.value.trim());
      localStorage.setItem('hall_admin_token', adminTokenInput.value.trim());
      alert('保存しました');
    }

    function api(path, options = {}) {
      return fetch(`${apiBaseInput.value.trim()}${path}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Token': adminTokenInput.value.trim(),
          ...(options.headers || {}),
        },
      }).then((r) => r.json());
    }

    function vipText(status) {
      return status === 'approved' ? '承認済み' : status === 'candidate' ? '候補' : 'なし';
    }

    function yen(n) {
      return `¥${Number(n || 0).toLocaleString('ja-JP')}`;
    }

    function couponTargetText(coupon) {
      const target = coupon.target_rank || coupon.rank_target || '';
      if (coupon.member_id) return `個別(${coupon.member_id})`;
      return target || '全ランク';
    }

    function couponExpiryText(coupon) {
      return coupon.expires_at || '-';
    }

    function couponStatusText(coupon) {
      return Number(coupon.is_active || 0) === 1 ? '有効' : '無効';
    }

    function renderStats() {
      const members = state.members;
      document.getElementById('stat-members').textContent = members.length;
      document.getElementById('stat-candidates').textContent = members.filter(m => m.vip_status === 'candidate').length;
      document.getElementById('stat-approved').textContent = members.filter(m => m.vip_status === 'approved').length;
      document.getElementById('stat-gold-up').textContent = members.filter(m => ['GOLD', 'DIAMOND'].includes(m.rank) || m.vip_status === 'approved').length;
    }

    function renderMembers() {
      const tbody = document.getElementById('members-body');
      const cards = document.getElementById('members-cards');
      tbody.innerHTML = '';
      cards.innerHTML = '';

      if (!state.members.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="muted" style="padding:12px 10px;">データがありません</td></tr>';
        cards.innerHTML = '<div class="muted">データがありません</div>';
        renderStats();
        return;
      }

      state.members.forEach((m) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.06);"><strong>${m.name}</strong><div class="muted">${m.line_user_id}</div></td>
          <td style="padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.06);">${m.rank}</td>
          <td style="padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.06);">${m.total_visits}回</td>
          <td style="padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.06);">${yen(m.total_spent)}</td>
          <td style="padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.06);"><span class="pill">${vipText(m.vip_status)}</span></td>
          <td style="padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.06);"><button class="ghost" data-id="${m.id}">詳細</button></td>
        `;
        tbody.appendChild(tr);

        const card = document.createElement('div');
        card.className = 'member-card';
        card.innerHTML = `
          <div class="member-card-top">
            <div>
              <div class="member-name">${m.name}</div>
              <div class="line-id">${m.line_user_id}</div>
            </div>
            <div class="actions">
              <span class="pill">${m.rank}</span>
              <span class="pill">${vipText(m.vip_status)}</span>
            </div>
          </div>
          <div class="member-meta">
            <div class="meta-box"><div class="label">来店</div><strong>${m.total_visits}</strong></div>
            <div class="meta-box"><div class="label">累計</div><strong>${yen(m.total_spent)}</strong></div>
            <div class="meta-box"><div class="label">ID</div><strong>${m.id}</strong></div>
          </div>
          <div class="actions">
            <button class="ghost" data-id="${m.id}">詳細を見る</button>
          </div>
        `;
        cards.appendChild(card);
      });

      document.querySelectorAll('button[data-id]').forEach((btn) => {
        btn.addEventListener('click', () => selectMember(btn.dataset.id));
      });

      renderStats();
    }

    function renderCoupons(coupons) {
      const cards = document.getElementById('coupon-cards');
      cards.innerHTML = '';

      if (!coupons.length) {
        cards.innerHTML = '<div class="muted">クーポンがありません</div>';
        return;
      }

      coupons.forEach((coupon) => {
        const card = document.createElement('div');
        card.className = 'coupon-card';
        card.innerHTML = `
          <div class="coupon-card-top">
            <div>
              <div class="coupon-title">${coupon.title}</div>
              <div class="coupon-desc">${coupon.description || ''}</div>
            </div>
            <span class="pill">${couponStatusText(coupon)}</span>
          </div>
          <div class="coupon-badges">
            <span class="pill">${couponTargetText(coupon)}</span>
            <span class="pill">期限 ${couponExpiryText(coupon)}</span>
          </div>
          <div class="actions" style="margin-top:12px;">
            ${Number(coupon.is_active || 0) === 1
              ? `<button class="danger" data-coupon-disable="${coupon.id}">無効化</button>`
              : `<button class="ghost" disabled>無効済み</button>`}
          </div>
        `;
        cards.appendChild(card);
      });

      cards.querySelectorAll('button[data-coupon-disable]').forEach((btn) => {
        btn.addEventListener('click', () => deactivateCoupon(btn.dataset.couponDisable));
      });
    }

    async function loadMembers() {
      const q = document.getElementById('search-q').value.trim();
      const vipOnly = document.getElementById('filter-vip').value;
      const query = new URLSearchParams({ q, vipOnly }).toString();
      const data = await api(`/api/admin/members?${query}`);
      if (!data.ok) return alert(data.error || '会員取得失敗');
      state.members = data.members || [];
      renderMembers();
    }

    async function loadVipCandidates() {
      const data = await api('/api/admin/vip-candidates');
      if (!data.ok) return alert(data.error || 'VIP候補取得失敗');
      state.members = data.members || [];
      renderMembers();
    }

    async function loadCoupons() {
      const data = await api('/api/admin/coupons');
      const msg = document.getElementById('coupon-list-message');
      if (!data.ok) {
        msg.textContent = data.error || 'クーポン取得失敗';
        msg.className = 'message ng';
        return;
      }
      renderCoupons(data.coupons || []);
      msg.textContent = '';
      msg.className = 'message';
    }

    async function deactivateCoupon(couponId) {
      const data = await api('/api/admin/coupon/deactivate', {
        method: 'POST',
        body: JSON.stringify({ couponId: Number(couponId) })
      });
      const msg = document.getElementById('coupon-list-message');
      if (!data.ok) {
        msg.textContent = data.error || '無効化失敗';
        msg.className = 'message ng';
        return;
      }
      msg.textContent = 'クーポンを無効化しました';
      msg.className = 'message ok';
      await loadCoupons();
    }

    async function selectMember(memberId) {
      const data = await api(`/api/admin/member/detail?memberId=${encodeURIComponent(memberId)}`);
      if (!data.ok) return alert(data.error || '詳細取得失敗');
      state.selected = data.member;
      document.getElementById('detail-empty').classList.add('hidden');
      document.getElementById('detail-box').classList.remove('hidden');
      document.getElementById('detail-name').textContent = data.member.name;
      document.getElementById('detail-rank').textContent = data.member.rank;
      document.getElementById('detail-line').textContent = data.member.line_user_id;
      document.getElementById('detail-visits').textContent = `${data.member.total_visits}回`;
      document.getElementById('detail-total').textContent = yen(data.member.total_spent);
      document.getElementById('detail-vip').textContent = vipText(data.member.vip_status);
      document.getElementById('detail-id').textContent = data.member.id;
      document.getElementById('coupon-member-id').value = data.member.id;
    }

    async function addVisit() {
      if (!state.selected) return alert('顧客を選択してください');
      const payload = {
        memberId: state.selected.id,
        visitDate: document.getElementById('visit-date').value.trim() || new Date().toISOString().slice(0, 10),
        spentAmount: Number(document.getElementById('visit-spent').value || 0),
        pointsAdded: Number(document.getElementById('visit-points').value || 10),
        note: document.getElementById('visit-note').value.trim(),
      };
      const data = await api('/api/admin/member/add-visit', { method: 'POST', body: JSON.stringify(payload) });
      const msg = document.getElementById('visit-message');
      if (!data.ok) {
        msg.textContent = data.error || '追加失敗';
        msg.className = 'message ng';
        return;
      }
      msg.textContent = '来店を追加しました';
      msg.className = 'message ok';
      await loadMembers();
      await selectMember(state.selected.id);
    }

    async function createCoupon() {
      const payload = {
        title: document.getElementById('coupon-title').value.trim(),
        description: document.getElementById('coupon-description').value.trim(),
        expiresAt: document.getElementById('coupon-expires').value.trim(),
        targetRank: document.getElementById('coupon-rank').value.trim(),
        memberId: document.getElementById('coupon-member-id').value.trim(),
      };
      const data = await api('/api/admin/coupon/create', { method: 'POST', body: JSON.stringify(payload) });
      const msg = document.getElementById('coupon-message');
      if (!data.ok) {
        msg.textContent = data.error || '作成失敗';
        msg.className = 'message ng';
        return;
      }
      msg.textContent = 'クーポンを作成しました';
      msg.className = 'message ok';
      await loadCoupons();
    }

    async function approveVip() {
      if (!state.selected) return alert('顧客を選択してください');
      const payload = { memberId: state.selected.id, adminNote: document.getElementById('vip-note').value.trim() };
      const data = await api('/api/admin/vip/approve', { method: 'POST', body: JSON.stringify(payload) });
      const msg = document.getElementById('vip-message');
      if (!data.ok) {
        msg.textContent = data.error || '承認失敗';
        msg.className = 'message ng';
        return;
      }
      msg.textContent = 'VIP承認しました';
      msg.className = 'message ok';
      await loadMembers();
      await selectMember(state.selected.id);
    }

    async function rejectVip() {
      if (!state.selected) return alert('顧客を選択してください');
      const payload = { memberId: state.selected.id, adminNote: document.getElementById('vip-note').value.trim() };
      const data = await api('/api/admin/vip/reject', { method: 'POST', body: JSON.stringify(payload) });
      const msg = document.getElementById('vip-message');
      if (!data.ok) {
        msg.textContent = data.error || '却下失敗';
        msg.className = 'message ng';
        return;
      }
      msg.textContent = 'VIP却下しました';
      msg.className = 'message ok';
      await loadMembers();
      await selectMember(state.selected.id);
    }

    document.getElementById('save-config').addEventListener('click', saveConfig);
    document.getElementById('refresh-members').addEventListener('click', loadMembers);
    document.getElementById('search-btn').addEventListener('click', loadMembers);
    document.getElementById('load-candidates').addEventListener('click', loadVipCandidates);
    document.getElementById('load-coupons-btn').addEventListener('click', loadCoupons);
    document.getElementById('add-visit-btn').addEventListener('click', addVisit);
    document.getElementById('create-coupon').addEventListener('click', createCoupon);
    document.getElementById('approve-vip-btn').addEventListener('click', approveVip);
    document.getElementById('reject-vip-btn').addEventListener('click', rejectVip);

    loadMembers();
    loadCoupons();
  </script>
</body>
</html>
