<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HALL MEMBER</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }

    .wrap {
      padding: 20px;
    }

    .card {
      background: linear-gradient(145deg,#111,#000);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .gold {
      color: #d4af37;
    }

    .btn {
      background: #d4af37;
      color: #000;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <h2>SHISHA CAFE HALL</h2>
    <div id="line"></div>
  </div>

  <div id="main" style="display:none">

    <div class="card">
      <div id="name"></div>
      <div id="rank" class="gold"></div>
      <h1 id="point"></h1>
      <div id="next"></div>
    </div>

    <div class="card">
      <h3>クーポン</h3>
      <div id="coupons"></div>
    </div>

  </div>

  <div id="register" class="card" style="display:none">
    <h3>初回登録</h3>
    <input id="reg_name" placeholder="名前" style="width:100%;padding:10px;margin-top:10px">
    <button class="btn" onclick="register()">登録</button>
  </div>

</div>

<script>

const API = "https://hall-loyalty-api.hallshisha.workers.dev";
const LIFF_ID = "2009509317-b3BuEvqf";

let lineUserId = null;

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  lineUserId = profile.userId;

  document.getElementById("line").innerText = "LINE ID: " + lineUserId;

  loadMember();
}

async function loadMember() {
  const res = await fetch(API + "/api/public/member?lineUserId=" + lineUserId);
  const data = await res.json();

  if (!data.member) {
    document.getElementById("register").style.display = "block";
    return;
  }

  document.getElementById("main").style.display = "block";

  document.getElementById("name").innerText = data.member.name;
  document.getElementById("rank").innerText = data.member.rank;
  document.getElementById("point").innerText = data.member.total_points + " pt";

  const next = Math.max(0, 3 - data.member.total_visits);
  document.getElementById("next").innerText = "次まであと " + next + " 回";

  const wrap = document.getElementById("coupons");
  wrap.innerHTML = "";

  data.coupons.forEach(c => {
    const div = document.createElement("div");
    div.style.marginBottom = "10px";
    div.innerHTML = `
      <div class="card">
        <b>${c.title}</b><br>
        ${c.description || ""}
      </div>
    `;
    wrap.appendChild(div);
  });
}

async function register() {
  const name = document.getElementById("reg_name").value;

  await fetch(API + "/api/public/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      lineUserId,
      name
    })
  });

  location.reload();
}

init();

</script>

</body>
</html>
